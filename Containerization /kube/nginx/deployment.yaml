apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: dev                 
  labels:
    app: nginx
    env: lab
spec:
  serviceAccountName: my-app
  replicas: 3
  selector:
    matchLabels:
      app: nginx                   
  template:
    metadata:
      labels:
        app: nginx                
        env: lab
    spec:
      containers:
        - name: nginx
          image: public.ecr.aws/nginx/nginx:1.26
          ports:
            - containerPort: 80
              name: http
          resources:              
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 128Mi
