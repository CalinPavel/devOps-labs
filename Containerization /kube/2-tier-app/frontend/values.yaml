replicaCount: 2

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-ui
  tag: 1.0.0
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

redis:
  host: backend-redis-master

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi